function Icon({ name, size = 18, color = "currentColor", strokeWidth = 2, style }) {

// Shorthand components so the app code reads naturally
const Home=(p)=><Icon name="Home" {...p}/>, Plus=(p)=><Icon name="Plus" {...p}/>, Trash2=(p)=><Icon name="Trash2" {...p}/>,
  Camera=(p)=><Icon name="Camera" {...p}/>, Receipt=(p)=><Icon name="Receipt" {...p}/>, FileText=(p)=><Icon name="FileText" {...p}/>,
  ClipboardList=(p)=><Icon name="ClipboardList" {...p}/>, TrendingUp=(p)=><Icon name="TrendingUp" {...p}/>, Package=(p)=><Icon name="Package" {...p}/>,

  Upload=(p)=><Icon name="Upload" {...p}/>, ChevronRight=(p)=><Icon name="ChevronRight" {...p}/>, ChevronDown=(p)=><Icon name="ChevronDown" {...p}/>,

/* ---------- Construction stage template ---------- */
const STAGE_TEMPLATE = [
  { key: "plans", name: "Plans" },
  { key: "permitting", name: "Permitting" },
  { key: "sitework", name: "Site Work / Excavation" },
  { key: "concrete", name: "Concrete / Foundation" },
  { key: "framing", name: "Framing" },
  { key: "windows", name: "Windows" },
  { key: "roofing", name: "Roofing" },
  { key: "siding", name: "Siding" },
  { key: "soffit", name: "Soffit & Fascia" },
  { key: "plumbing", name: "Plumbing" },
  { key: "heating", name: "Heating / HVAC" },
  { key: "electrical", name: "Electrical" },
  { key: "insulation", name: "Insulation" },
  { key: "sheetrock", name: "Sheet Rock / Drywall" },
  { key: "paint", name: "Paint" },
  { key: "cabinets", name: "Cabinets" },
  { key: "counters", name: "Counters" },
  { key: "flooring", name: "Flooring" },
  { key: "trim", name: "Trim / Millwork" },
  { key: "fixtures", name: "Fixtures & Finishes" },
  { key: "final", name: "Final / Punch List" },
];
const CATEGORIES = STAGE_TEMPLATE.map((s) => s.name).concat(["Labor", "Permits/Fees", "Other"]);
const money = (n) => (n < 0 ? "-$" : "$") + Math.abs(Number(n) || 0).toLocaleString("en-US", { minimumFractionDigits: 2, maximumFractionDigits: 2 });
const uid = () => Date.now().toString(36) + Math.random().toString(36).slice(2, 7);

function newHouseData(name) {
  return {
    name, address: "", createdAt: Date.now(),
    receipts: [], estimates: [], photos: [],
    stages: STAGE_TEMPLATE.map((s) => ({ key: s.key, name: s.name, done: false, completionItems: [], materialItems: [], estimatedCost: 0, note: "" })),
  };
}
function fileToCompressedDataURL(file, maxDim = 1280, quality = 0.7) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = (e) => {
      const img = new Image();
      img.onload = () => {
        let { width, height } = img;
        if (width > height && width > maxDim) { height = Math.round((height * maxDim) / width); width = maxDim; }
        else if (height > maxDim) { width = Math.round((width * maxDim) / height); height = maxDim; }
        const canvas = document.createElement("canvas");
        canvas.width = width; canvas.height = height;
        canvas.getContext("2d").drawImage(img, 0, 0, width, height);
        resolve(canvas.toDataURL("image/jpeg", quality));
      };
      img.onerror = reject; img.src = e.target.result;
    };
    reader.onerror = reject; reader.readAsDataURL(file);
  });
}
async function uploadImage(houseId, folder, dataUrl) {
  const path = `houses/${houseId}/${folder}/${uid()}.jpg`;
  const sref = storage.ref(path);
  await sref.putString(dataUrl, "data_url");
  const url = await sref.getDownloadURL();
  return { url, path };
}
async function removeImage(path) {
  if (!path) return;
  try { await storage.ref(path).delete(); } catch (e) {}
}
function App() {
  const [user, setUser] = useState(null);
  const [authReady, setAuthReady] = useState(false);

  useEffect(() => {
    return auth.onAuthStateChanged((u) => { setUser(u); setAuthReady(true); });
  }, []);

  if (!authReady) return <div style={S.loading}>Loading…</div>;
  if (!user) return <Login />;
  return <Dashboard user={user} />;
}

/* ================= Login / Setup ================= */
function Login() {
  const [mode, setMode] = useState("login"); // login | setup
  const [email, setEmail] = useState("");
  const [password, setPassword] = useState("");
  const [err, setErr] = useState("");
  const [busy, setBusy] = useState(false);

  const submit = async () => {
    setErr(""); setBusy(true);
    try {
      if (mode === "login") {
        await auth.signInWithEmailAndPassword(email.trim(), password);
      } else {
        await auth.createUserWithEmailAndPassword(email.trim(), password);
      }
    } catch (e) {
      setErr(friendlyAuthError(e.code));
    }
    setBusy(false);
  };

  return (
    <div style={S.authWrap}>
      <div style={S.authCard}>
        <div style={S.logoMarkLg}><Home size={26} color="#fff" /></div>
        <div style={S.authTitle}>WILLISTON HOMES</div>
        <div style={S.authSub}>Build Manager</div>

        <input style={S.input} placeholder="Email" type="email" value={email} onChange={(e) => setEmail(e.target.value)} />
        <input style={{ ...S.input, marginTop: 10 }} placeholder="Password" type="password" value={password}
          onChange={(e) => setPassword(e.target.value)} onKeyDown={(e) => e.key === "Enter" && submit()} />

        {err && <div style={S.authErr}>{err}</div>}

        <button style={{ ...S.primaryBtn, width: "100%", justifyContent: "center", marginTop: 14, padding: "12px" }} onClick={submit} disabled={busy}>
          {busy ? "Please wait…" : mode === "login" ? "Sign In" : "Create Account"}
        </button>

        <button style={S.linkBtn} onClick={() => { setMode(mode === "login" ? "setup" : "login"); setErr(""); }}>
          {mode === "login" ? "First time setup — create an account" : "← Back to sign in"}
        </button>
      </div>
      <div style={S.authFoot}>Williston Homes LLC · Build Manager</div>
    </div>
  );
}

function friendlyAuthError(code) {
  const map = {
    "auth/invalid-email": "That email address looks invalid.",
    "auth/user-not-found": "No account found for that email.",
    "auth/wrong-password": "Incorrect password.",
    "auth/invalid-credential": "Email or password is incorrect.",
    "auth/email-already-in-use": "An account already exists for that email.",
    "auth/weak-password": "Password must be at least 6 characters.",
  };
  return map[code] || "Something went wrong. Please try again.";
}

/* ================= Dashboard (houses live from Firestore) ================= */
function Dashboard({ user }) {
  const [houses, setHouses] = useState([]);
  const [loading, setLoading] = useState(true);
  const [activeId, setActiveId] = useState(null);
  const [adding, setAdding] = useState(false);
  const [newName, setNewName] = useState("");
  const [tab, setTab] = useState("overview");

  useEffect(() => {
    const q = db.collection("houses").orderBy("createdAt", "asc");
    return q.onSnapshot((snap) => {
      setHouses(snap.docs.map((d) => ({ id: d.id, ...d.data() })));
      setLoading(false);
    });
  }, []);

  const active = houses.find((h) => h.id === activeId) || null;

  const persist = useCallback(async (house) => {
    const { id, ...data } = house;
    await db.collection("houses").doc(id).set({ ...data, updatedAt: firebase.firestore.FieldValue.serverTimestamp() }, { merge: true });
  }, []);

  const createHouse = async () => {
    const name = newName.trim();
    if (!name) return;
    const id = uid();
    await db.collection("houses").doc(id).set({ ...newHouseData(name), createdAt: Date.now() });
    setNewName(""); setAdding(false); setActiveId(id);
  };

  const removeHouse = async (id) => {
    if (!confirm("Delete this house and all its data? This cannot be undone.")) return;
    await db.collection("houses").doc(id).delete();
    if (activeId === id) setActiveId(null);
  };

  if (loading) return <div style={S.loading}>Loading projects…</div>;

  /* ---- House list ---- */
  if (!active) {
    return (
      <div style={S.app}>
        <Header user={user} />
        <div style={S.container}>
          <div style={S.listHeader}>
            <h2 style={S.h2}>Projects</h2>
            <button style={S.primaryBtn} onClick={() => setAdding(true)}><Plus size={16} /> New House</button>
          </div>

          {adding && (
            <div style={S.addCard}>
              <input autoFocus style={S.input} placeholder="House name / address (e.g. 1420 12th St W)"
                value={newName} onChange={(e) => setNewName(e.target.value)} onKeyDown={(e) => e.key === "Enter" && createHouse()} />
              <div style={{ display: "flex", gap: 8 }}>
                <button style={S.primaryBtn} onClick={createHouse}>Create</button>
                <button style={S.ghostBtn} onClick={() => { setAdding(false); setNewName(""); }}>Cancel</button>
              </div>
            </div>
          )}

          {houses.length === 0 && !adding && (
            <div style={S.empty}>
              <Building2 size={40} strokeWidth={1.3} color="#9a8f7a" />
              <p style={{ color: "#7a7266", marginTop: 12 }}>No houses yet. Add your first build to get started.</p>
            </div>
          )}

          <div style={S.grid}>
            {houses.map((h) => (
              <HouseCard key={h.id} house={h} onOpen={() => { setActiveId(h.id); setTab("overview"); }} onDelete={() => removeHouse(h.id)} />
            ))}
          </div>
        </div>
      </div>
    );
  }

  /* ---- Single house ---- */
  const TABS = [
    { key: "overview", label: "Overview", icon: Home },
    { key: "pl", label: "P&L", icon: TrendingUp },
    { key: "receipts", label: "Receipts", icon: Receipt },
    { key: "estimates", label: "Estimates", icon: FileText },
    { key: "stages", label: "Stages", icon: ClipboardList },
    { key: "photos", label: "Photos", icon: Camera },
  ];

  return (
    <div style={S.app}>
      <Header user={user} />
      <div style={S.houseBar}>
        <button style={S.backBtn} onClick={() => setActiveId(null)}><ArrowLeft size={16} /> All Houses</button>
        <HouseTitle house={active} onChange={persist} />
      </div>
      <div style={S.tabBar}>
        {TABS.map((t) => {
          const Icon = t.icon;
          return (
            <button key={t.key} style={{ ...S.tab, ...(tab === t.key ? S.tabActive : {}) }} onClick={() => setTab(t.key)}>
              <Icon size={15} /> {t.label}
            </button>
          );
        })}
      </div>
      <div style={S.container}>
        {tab === "overview" && <Overview house={active} setTab={setTab} />}
        {tab === "pl" && <PL house={active} />}
        {tab === "receipts" && <Receipts house={active} persist={persist} />}
        {tab === "estimates" && <Estimates house={active} persist={persist} />}
        {tab === "stages" && <Stages house={active} persist={persist} />}
        {tab === "photos" && <Photos house={active} persist={persist} />}
      </div>
    </div>
  );
}

/* ================= Header ================= */
function Header({ user }) {
  return (
    <div style={S.header}>
      <div style={S.logo}>
        <div style={S.logoMark}><Home size={18} color="#fff" /></div>
        <div>
          <div style={S.logoText}>WILLISTON HOMES</div>
          <div style={S.logoSub}>Build Manager</div>
        </div>
      </div>
      <div style={S.headerRight}>
        <span style={S.userEmail}>{user.email}</span>
        <button style={S.logoutBtn} onClick={() => auth.signOut()} title="Sign out"><LogOut size={15} /></button>
      </div>
    </div>
  );
}

function HouseCard({ house, onOpen, onDelete }) {
  const spent = house.receipts.reduce((a, r) => a + (Number(r.amount) || 0), 0);
  const doneStages = house.stages.filter((s) => s.done).length;
  const total = house.stages.length;
  return (
    <div style={S.houseCard}>
      <div style={{ cursor: "pointer", flex: 1 }} onClick={onOpen}>
        <div style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 10 }}>
          <div style={S.houseIcon}><Home size={18} color="#8a5a2b" /></div>
          <div style={S.houseName}>{house.name}</div>
        </div>
        <div style={S.progressTrack}><div style={{ ...S.progressFill, width: `${(doneStages / total) * 100}%` }} /></div>
        <div style={S.cardStats}>
          <span>{doneStages}/{total} stages</span>
          <span style={{ color: "#8a5a2b", fontWeight: 600 }}>{money(spent)} spent</span>
        </div>
      </div>
      <button style={S.iconDanger} onClick={onDelete} title="Delete house"><Trash2 size={15} /></button>
    </div>
  );
}

function HouseTitle({ house, onChange }) {
  const [editing, setEditing] = useState(false);
  const [name, setName] = useState(house.name);
  const [addr, setAddr] = useState(house.address || "");
  useEffect(() => { setName(house.name); setAddr(house.address || ""); }, [house.id]);
  if (editing) {
    return (
      <div style={{ display: "flex", gap: 8, alignItems: "center", flexWrap: "wrap" }}>
        <input style={{ ...S.input, width: 200 }} value={name} onChange={(e) => setName(e.target.value)} placeholder="House name" />
        <input style={{ ...S.input, width: 200 }} value={addr} onChange={(e) => setAddr(e.target.value)} placeholder="Address" />
        <button style={S.primaryBtn} onClick={() => { onChange({ ...house, name: name.trim() || house.name, address: addr }); setEditing(false); }}>Save</button>
      </div>
    );
  }
  return (
    <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
      <div>
        <div style={S.houseTitle}>{house.name}</div>
        {house.address && <div style={S.houseAddr}>{house.address}</div>}
      </div>
      <button style={S.iconGhost} onClick={() => setEditing(true)}><Edit2 size={14} /></button>
    </div>
  );
}

/* ================= Overview ================= */
function Overview({ house, setTab }) {
  const spent = house.receipts.reduce((a, r) => a + (Number(r.amount) || 0), 0);
  const estTotal = house.estimates.reduce((a, e) => a + (Number(e.amount) || 0), 0);
  const stageEst = house.stages.reduce((a, s) => a + (Number(s.estimatedCost) || 0), 0);
  const budget = estTotal || stageEst;
  const doneStages = house.stages.filter((s) => s.done).length;
  const openMaterials = house.stages.reduce((a, s) => a + s.materialItems.filter((m) => !m.ordered).length, 0);

  return (
    <div>
      <div style={S.metricGrid}>
        <Metric label="Total Spent" value={money(spent)} accent="#8a5a2b" />
        <Metric label="Budget / Est." value={money(budget)} />
        <Metric label={budget ? "Remaining" : "No budget set"} value={budget ? money(budget - spent) : "—"} accent={budget - spent < 0 ? "#b3261e" : "#2e7d32"} />
        <Metric label="Stages Done" value={`${doneStages} / ${house.stages.length}`} />
      </div>
      <div style={{ ...S.metricGrid, marginTop: 12 }}>
        <Metric label="Receipts Logged" value={house.receipts.length} />
        <Metric label="Photos" value={house.photos.length} />
        <Metric label="Materials to Order" value={openMaterials} accent={openMaterials > 0 ? "#b3691e" : "#2e7d32"} />
        <Metric label="Estimates" value={house.estimates.length} />
      </div>
      <h3 style={S.h3}>Stage progress</h3>
      <div style={S.stageStrip}>
        {house.stages.map((s) => (
          <div key={s.key} title={s.name} style={{ ...S.stageDot, background: s.done ? "#2e7d32" : "#e4ddd0", color: s.done ? "#fff" : "#8a8275" }}>{s.done ? "✓" : ""}</div>
        ))}
      </div>
      <div style={{ display: "flex", gap: 10, marginTop: 20, flexWrap: "wrap" }}>
        <button style={S.actionBtn} onClick={() => setTab("receipts")}><Receipt size={16} /> Add Receipt</button>
        <button style={S.actionBtn} onClick={() => setTab("photos")}><Camera size={16} /> Add Photo</button>
        <button style={S.actionBtn} onClick={() => setTab("stages")}><ClipboardList size={16} /> Checklists</button>
      </div>
    </div>
  );
}

function Metric({ label, value, accent }) {
  return (
    <div style={S.metric}>
      <div style={S.metricLabel}>{label}</div>
      <div style={{ ...S.metricValue, color: accent || "#2b2620" }}>{value}</div>
    </div>
  );
}

/* ================= P&L ================= */
function PL({ house }) {
  const byCat = {}, estByCat = {};
  house.receipts.forEach((r) => { const c = r.category || "Other"; byCat[c] = (byCat[c] || 0) + (Number(r.amount) || 0); });
  house.estimates.forEach((e) => { const c = e.category || "Other"; estByCat[c] = (estByCat[c] || 0) + (Number(e.amount) || 0); });
  const cats = Array.from(new Set([...Object.keys(byCat), ...Object.keys(estByCat)])).sort();
  const totalSpent = house.receipts.reduce((a, r) => a + (Number(r.amount) || 0), 0);
  const totalEst = house.estimates.reduce((a, e) => a + (Number(e.amount) || 0), 0);
  return (
    <div>
      <div style={S.metricGrid}>
        <Metric label="Estimated" value={money(totalEst)} />
        <Metric label="Actual Spent" value={money(totalSpent)} accent="#8a5a2b" />
        <Metric label="Variance" value={money(totalEst - totalSpent)} accent={totalEst - totalSpent < 0 ? "#b3261e" : "#2e7d32"} />
      </div>
      <h3 style={S.h3}>Cost by category</h3>
      <div style={S.tableWrap}>
        <table style={S.table}>
          <thead><tr>
            <th style={S.th}>Category</th>
            <th style={{ ...S.th, textAlign: "right" }}>Estimated</th>
            <th style={{ ...S.th, textAlign: "right" }}>Actual</th>
            <th style={{ ...S.th, textAlign: "right" }}>Variance</th>
          </tr></thead>
          <tbody>
            {cats.length === 0 && <tr><td colSpan={4} style={{ ...S.td, textAlign: "center", color: "#9a8f7a" }}>No costs logged yet.</td></tr>}
            {cats.map((c) => {
              const est = estByCat[c] || 0, act = byCat[c] || 0;
              return (
                <tr key={c}>
                  <td style={S.td}>{c}</td>
                  <td style={{ ...S.td, textAlign: "right" }}>{money(est)}</td>
                  <td style={{ ...S.td, textAlign: "right", fontWeight: 600 }}>{money(act)}</td>
                  <td style={{ ...S.td, textAlign: "right", color: est - act < 0 ? "#b3261e" : "#2e7d32" }}>{money(est - act)}</td>
                </tr>
              );
            })}
          </tbody>
          <tfoot><tr>
            <td style={{ ...S.td, ...S.totalRow }}>Total</td>
            <td style={{ ...S.td, ...S.totalRow, textAlign: "right" }}>{money(totalEst)}</td>
            <td style={{ ...S.td, ...S.totalRow, textAlign: "right" }}>{money(totalSpent)}</td>
            <td style={{ ...S.td, ...S.totalRow, textAlign: "right", color: totalEst - totalSpent < 0 ? "#b3261e" : "#2e7d32" }}>{money(totalEst - totalSpent)}</td>
          </tr></tfoot>
        </table>
      </div>
    </div>
  );
}

/* ================= Receipts ================= */
function Receipts({ house, persist }) {
  const [form, setForm] = useState({ vendor: "", category: "", amount: "", date: new Date().toISOString().slice(0, 10), note: "" });
  const [photo, setPhoto] = useState(null);
  const [busy, setBusy] = useState(false);
  const fileRef = useRef();

  const onPhoto = async (e) => {
    const f = e.target.files?.[0]; if (!f) return;
    setBusy(true);
    try { setPhoto(await fileToCompressedDataURL(f)); } catch { alert("Could not read image."); }
    setBusy(false);
  };

  const add = async () => {
    if (!form.amount) { alert("Enter an amount."); return; }
    setBusy(true);
    let img = null;
    if (photo) { try { img = await uploadImage(house.id, "receipts", photo); } catch { alert("Photo upload failed; saving without it."); } }
    const receipt = { id: uid(), ...form, amount: Number(form.amount), photo: img?.url || null, photoPath: img?.path || null };
    await persist({ ...house, receipts: [receipt, ...house.receipts] });
    setForm({ vendor: "", category: "", amount: "", date: new Date().toISOString().slice(0, 10), note: "" });
    setPhoto(null); setBusy(false);
    if (fileRef.current) fileRef.current.value = "";
  };

  const remove = async (r) => {
    await removeImage(r.photoPath);
    await persist({ ...house, receipts: house.receipts.filter((x) => x.id !== r.id) });
  };

  const total = house.receipts.reduce((a, r) => a + (Number(r.amount) || 0), 0);
  return (
    <div>
      <div style={S.formCard}>
        <div style={S.formGrid}>
          <input style={S.input} placeholder="Vendor / store" value={form.vendor} onChange={(e) => setForm({ ...form, vendor: e.target.value })} />
          <select style={S.input} value={form.category} onChange={(e) => setForm({ ...form, category: e.target.value })}>
            <option value="">Category…</option>
            {CATEGORIES.map((c) => <option key={c} value={c}>{c}</option>)}
          </select>
          <input style={S.input} type="number" step="0.01" placeholder="Amount" value={form.amount} onChange={(e) => setForm({ ...form, amount: e.target.value })} />
          <input style={S.input} type="date" value={form.date} onChange={(e) => setForm({ ...form, date: e.target.value })} />
        </div>
        <input style={{ ...S.input, marginTop: 10 }} placeholder="Note (optional)" value={form.note} onChange={(e) => setForm({ ...form, note: e.target.value })} />
        <div style={{ display: "flex", gap: 10, alignItems: "center", marginTop: 10, flexWrap: "wrap" }}>
          <label style={S.uploadBtn}>
            <Upload size={15} /> {photo ? "Change Photo" : "Attach Receipt Photo"}
            <input ref={fileRef} type="file" accept="image/*" capture="environment" onChange={onPhoto} style={{ display: "none" }} />
          </label>
          {busy && <span style={{ color: "#9a8f7a", fontSize: 13 }}>Working…</span>}
          {photo && <img src={photo} alt="receipt" style={S.thumb} />}
          <button style={{ ...S.primaryBtn, marginLeft: "auto" }} onClick={add} disabled={busy}><Plus size={16} /> Add Receipt</button>
        </div>
      </div>
      <div style={S.subHead}><span>{house.receipts.length} receipts</span><span style={{ color: "#8a5a2b", fontWeight: 700 }}>{money(total)}</span></div>
      <div style={S.list}>
        {house.receipts.map((r) => (
          <div key={r.id} style={S.receiptRow}>
            {r.photo ? <img src={r.photo} alt="" style={S.receiptThumb} onClick={() => window.open(r.photo)} /> : <div style={S.receiptNoPhoto}><Receipt size={18} color="#b8ac97" /></div>}
            <div style={{ flex: 1, minWidth: 0 }}>
              <div style={{ fontWeight: 600, color: "#2b2620" }}>{r.vendor || "(no vendor)"}</div>
              <div style={{ fontSize: 12, color: "#8a8275" }}>{r.category || "Uncategorized"} · {r.date}</div>
              {r.note && <div style={{ fontSize: 12, color: "#9a8f7a", marginTop: 2 }}>{r.note}</div>}
            </div>
            <div style={{ fontWeight: 700, color: "#8a5a2b", whiteSpace: "nowrap" }}>{money(r.amount)}</div>
            <button style={S.iconDanger} onClick={() => remove(r)}><Trash2 size={15} /></button>
          </div>
        ))}
      </div>
    </div>
  );
}

/* ================= Estimates ================= */
function Estimates({ house, persist }) {
  const [form, setForm] = useState({ label: "", category: "", amount: "", note: "" });
  const add = async () => {
    if (!form.label && !form.amount) return;
    const est = { id: uid(), ...form, amount: Number(form.amount) || 0 };
    await persist({ ...house, estimates: [est, ...house.estimates] });
    setForm({ label: "", category: "", amount: "", note: "" });
  };
  const remove = async (id) => persist({ ...house, estimates: house.estimates.filter((e) => e.id !== id) });
  const total = house.estimates.reduce((a, e) => a + (Number(e.amount) || 0), 0);
  return (
    <div>
      <div style={S.formCard}>
        <div style={S.formGrid}>
          <input style={S.input} placeholder="Estimate label (e.g. Framing bid — ABC)" value={form.label} onChange={(e) => setForm({ ...form, label: e.target.value })} />
          <select style={S.input} value={form.category} onChange={(e) => setForm({ ...form, category: e.target.value })}>
            <option value="">Category…</option>
            {CATEGORIES.map((c) => <option key={c} value={c}>{c}</option>)}
          </select>
          <input style={S.input} type="number" step="0.01" placeholder="Amount" value={form.amount} onChange={(e) => setForm({ ...form, amount: e.target.value })} />
          <button style={S.primaryBtn} onClick={add}><Plus size={16} /> Add</button>
        </div>
        <input style={{ ...S.input, marginTop: 10 }} placeholder="Note (scope, contractor, terms…)" value={form.note} onChange={(e) => setForm({ ...form, note: e.target.value })} />
      </div>
      <div style={S.subHead}><span>{house.estimates.length} estimates</span><span style={{ color: "#8a5a2b", fontWeight: 700 }}>{money(total)}</span></div>
      <div style={S.list}>
        {house.estimates.map((e) => (
          <div key={e.id} style={S.receiptRow}>
            <div style={S.receiptNoPhoto}><FileText size={18} color="#b8ac97" /></div>
            <div style={{ flex: 1, minWidth: 0 }}>
              <div style={{ fontWeight: 600, color: "#2b2620" }}>{e.label || "(untitled)"}</div>
              <div style={{ fontSize: 12, color: "#8a8275" }}>{e.category || "Uncategorized"}</div>
              {e.note && <div style={{ fontSize: 12, color: "#9a8f7a", marginTop: 2 }}>{e.note}</div>}
            </div>
            <div style={{ fontWeight: 700, color: "#8a5a2b", whiteSpace: "nowrap" }}>{money(e.amount)}</div>
            <button style={S.iconDanger} onClick={() => remove(e.id)}><Trash2 size={15} /></button>
          </div>
        ))}
      </div>
    </div>
  );
}

/* ================= Stages ================= */
function Stages({ house, persist }) {
  const [open, setOpen] = useState(null);
  const updateStage = async (key, patch) => {
    await persist({ ...house, stages: house.stages.map((s) => (s.key === key ? { ...s, ...patch } : s)) });
  };
  return (
    <div style={S.list}>
      {house.stages.map((s) => {
        const isOpen = open === s.key;
        const compDone = s.completionItems.filter((i) => i.done).length;
        const matOrdered = s.materialItems.filter((m) => m.ordered).length;
        return (
          <div key={s.key} style={{ ...S.stageCard, borderColor: s.done ? "#b7d9b8" : "#e8e1d4" }}>
            <div style={S.stageHead}>
              <button style={S.checkBtn} onClick={() => updateStage(s.key, { done: !s.done })}>
                <div style={{ ...S.checkbox, background: s.done ? "#2e7d32" : "#fff", borderColor: s.done ? "#2e7d32" : "#c9beac" }}>
                  {s.done && <span style={{ color: "#fff", fontSize: 13 }}>✓</span>}
                </div>
              </button>
              <div style={{ flex: 1, cursor: "pointer" }} onClick={() => setOpen(isOpen ? null : s.key)}>
                <div style={{ fontWeight: 600, color: s.done ? "#5a7a5a" : "#2b2620", textDecoration: s.done ? "line-through" : "none" }}>{s.name}</div>
                <div style={{ fontSize: 12, color: "#9a8f7a" }}>
                  {compDone}/{s.completionItems.length} tasks · {matOrdered}/{s.materialItems.length} materials{s.estimatedCost ? ` · est ${money(s.estimatedCost)}` : ""}
                </div>
              </div>
              <button style={S.iconGhost} onClick={() => setOpen(isOpen ? null : s.key)}>{isOpen ? <ChevronDown size={18} /> : <ChevronRight size={18} />}</button>
            </div>
            {isOpen && (
              <div style={S.stageBody}>
                <div style={{ display: "flex", gap: 10, marginBottom: 14, flexWrap: "wrap", alignItems: "center" }}>
                  <label style={{ fontSize: 12, color: "#8a8275" }}>Stage est. cost</label>
                  <input style={{ ...S.input, width: 140 }} type="number" step="0.01" value={s.estimatedCost || ""} onChange={(e) => updateStage(s.key, { estimatedCost: Number(e.target.value) || 0 })} placeholder="0.00" />
                </div>
                <ChecklistBlock title="Completion checklist" icon={<CheckSquare size={14} />} items={s.completionItems} placeholder="Add task to complete this stage…"
                  onAdd={(text) => updateStage(s.key, { completionItems: [...s.completionItems, { id: uid(), text, done: false }] })}
                  onToggle={(id) => updateStage(s.key, { completionItems: s.completionItems.map((i) => i.id === id ? { ...i, done: !i.done } : i) })}
                  onRemove={(id) => updateStage(s.key, { completionItems: s.completionItems.filter((i) => i.id !== id) })}
                  toggleField="done" />
                <ChecklistBlock title="Materials to order" icon={<Package size={14} />} items={s.materialItems} placeholder="Add material to order…"
                  onAdd={(text) => updateStage(s.key, { materialItems: [...s.materialItems, { id: uid(), text, ordered: false }] })}
                  onToggle={(id) => updateStage(s.key, { materialItems: s.materialItems.map((i) => i.id === id ? { ...i, ordered: !i.ordered } : i) })}
                  onRemove={(id) => updateStage(s.key, { materialItems: s.materialItems.filter((i) => i.id !== id) })}
                  toggleField="ordered" toggleLabel="ordered" />
                <textarea style={S.textarea} placeholder="Notes for this stage…" value={s.note} onChange={(e) => updateStage(s.key, { note: e.target.value })} />
              </div>
            )}
          </div>
        );
      })}
    </div>
  );
}

function ChecklistBlock({ title, icon, items, placeholder, onAdd, onToggle, onRemove, toggleField, toggleLabel }) {
  const [text, setText] = useState("");
  const submit = () => { if (text.trim()) { onAdd(text.trim()); setText(""); } };
  return (
    <div style={{ marginBottom: 16 }}>
      <div style={S.checklistTitle}>{icon} {title}</div>
      {items.map((i) => (
        <div key={i.id} style={S.checkItem}>
          <button style={S.checkBtnSm} onClick={() => onToggle(i.id)}>
            <div style={{ ...S.checkboxSm, background: i[toggleField] ? "#8a5a2b" : "#fff", borderColor: i[toggleField] ? "#8a5a2b" : "#c9beac" }}>
              {i[toggleField] && <span style={{ color: "#fff", fontSize: 11 }}>✓</span>}
            </div>
          </button>
          <span style={{ flex: 1, fontSize: 14, color: i[toggleField] ? "#9a8f7a" : "#2b2620", textDecoration: i[toggleField] ? "line-through" : "none" }}>
            {i.text}{toggleLabel && i[toggleField] ? " ✓ ordered" : ""}
          </span>
          <button style={S.iconDangerSm} onClick={() => onRemove(i.id)}><X size={13} /></button>
        </div>
      ))}
      <div style={{ display: "flex", gap: 8, marginTop: 6 }}>
        <input style={{ ...S.input, flex: 1 }} placeholder={placeholder} value={text} onChange={(e) => setText(e.target.value)} onKeyDown={(e) => e.key === "Enter" && submit()} />
        <button style={S.ghostBtn} onClick={submit}><Plus size={15} /></button>
      </div>
    </div>
  );
}

/* ================= Photos ================= */
function Photos({ house, persist }) {
  const [busy, setBusy] = useState(false);
  const [caption, setCaption] = useState("");
  const fileRef = useRef();

  const onFiles = async (e) => {
    const files = Array.from(e.target.files || []); if (!files.length) return;
    setBusy(true);
    const added = [];
    for (const f of files) {
      try {
        const data = await fileToCompressedDataURL(f);
        const img = await uploadImage(house.id, "photos", data);
        added.push({ id: uid(), caption, url: img.url, path: img.path, date: new Date().toISOString().slice(0, 10) });
      } catch { /* skip */ }
    }
    await persist({ ...house, photos: [...added, ...house.photos] });
    setCaption(""); setBusy(false);
    if (fileRef.current) fileRef.current.value = "";
  };

  const remove = async (p) => {
    await removeImage(p.path);
    await persist({ ...house, photos: house.photos.filter((x) => x.id !== p.id) });
  };

  return (
    <div>
      <div style={S.formCard}>
        <input style={S.input} placeholder="Caption for next upload (optional)" value={caption} onChange={(e) => setCaption(e.target.value)} />
        <label style={{ ...S.uploadBtn, marginTop: 10, justifyContent: "center" }}>
          <Camera size={16} /> {busy ? "Uploading…" : "Take / Upload Photos"}
          <input ref={fileRef} type="file" accept="image/*" capture="environment" multiple onChange={onFiles} style={{ display: "none" }} />
        </label>
      </div>
      <div style={S.photoGrid}>
        {house.photos.map((p) => (
          <div key={p.id} style={S.photoCard}>
            <img src={p.url} alt={p.caption} style={S.photoImg} onClick={() => window.open(p.url)} />
            <div style={S.photoMeta}>
              <div style={{ fontSize: 12, color: "#2b2620", flex: 1, minWidth: 0, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{p.caption || p.date}</div>
              <button style={S.iconDangerSm} onClick={() => remove(p)}><Trash2 size={13} /></button>
            </div>
          </div>
        ))}
      </div>
      {house.photos.length === 0 && <div style={S.empty}><Camera size={36} strokeWidth={1.3} color="#c9beac" /><p style={{ color: "#9a8f7a", marginTop: 10 }}>No photos yet.</p></div>}
    </div>
  );
}
